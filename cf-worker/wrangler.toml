name = "glimpse-api-gateway"
main = "src/index.js"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "glimpseapp.net/api/v1/*", zone_name = "glimpseapp.net" }
]

[vars]
WORKER_DOMAIN = "glimpseapp.net"
LIVE_FEED_INIT_ITEMS = "50"
LIVE_FEED_MAX_ITEMS_PER_CATEGORY = "1000"
LIVE_FEED_MAX_LOAD_OLDER = "100"

[[durable_objects.bindings]]
name = "GLIMPSE_LIVE_FEED"
class_name = "LiveFeedHubv2"

[[migrations]]
tag = "v2_live_feed_hub"
new_sqlite_classes = ["LiveFeedHubv2"]

# Secrets (set via wrangler secret put):
#   TOKEN_SECRET       — HMAC key for Worker JWTs
#   APP_SECRET         — Shared secret for /api/v1/get-token
#   DRF_TOKEN          — DRF auth token for origin fetch
#   ORIGIN_BASE        — https://glimpseapp.net/origin
#   ORIGIN_PATH_SECRET — Shared secret to access /origin/ path on Django
#   ALLOWED_ORIGIN     — (optional) restrict CORS to a single origin, e.g. https://glimpseapp.net
#                        omit or set to * to allow all origins (JWT is the auth boundary)

# Analytics Engine: free tier, 100k datapoints/day.
# Query via: https://api.cloudflare.com/client/v4/graphql (Workers Analytics Engine schema)
# Example query: count by blobs1 (layer) over last 24h on dataset "cache_analytics"
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "cache_analytics"
