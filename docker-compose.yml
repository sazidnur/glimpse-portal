services:
  db:
    image: postgres:16-alpine
    container_name: glimpse-portal-db
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_DB: ${DJANGO_DB_NAME}
      POSTGRES_USER: ${DJANGO_DB_USER}
      POSTGRES_PASSWORD: ${DJANGO_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DJANGO_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: glimpse-portal-redis
    restart: unless-stopped
    mem_limit: 256m
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glimpse-portal-django
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,glimpseapp.net}
      - DJANGO_DB_NAME=${DJANGO_DB_NAME}
      - DJANGO_DB_USER=${DJANGO_DB_USER}
      - DJANGO_DB_PASSWORD=${DJANGO_DB_PASSWORD:-postgres}
      - DJANGO_DB_HOST=db
      - DJANGO_DB_PORT=5432
      - PORTAL_URL_PREFIX=${PORTAL_URL_PREFIX:-portal}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://glimpseapp.net}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://glimpseapp.net}
      # Redis
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      # HTTPS router for /portal and /api paths
      - "traefik.http.routers.glimpse-portal.rule=Host(`${SITE_DOMAIN:-glimpseapp.net}`) && (PathPrefix(`/portal`) || PathPrefix(`/api`) || PathPrefix(`/origin`))"
      - "traefik.http.routers.glimpse-portal.entrypoints=websecure"
      - "traefik.http.routers.glimpse-portal.tls=true"
      - "traefik.http.routers.glimpse-portal.priority=100"
      - "traefik.http.services.glimpse-portal.loadbalancer.server.port=8000"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.glimpse-portal-http.rule=Host(`${SITE_DOMAIN:-glimpseapp.net}`) && (PathPrefix(`/portal`) || PathPrefix(`/api`) || PathPrefix(`/origin`))"
      - "traefik.http.routers.glimpse-portal-http.entrypoints=web"
      - "traefik.http.routers.glimpse-portal-http.priority=100"
      - "traefik.http.routers.glimpse-portal-http.middlewares=glimpse-portal-https-redirect"
      - "traefik.http.middlewares.glimpse-portal-https-redirect.redirectscheme.scheme=https"
    networks:
      - default
      - traefik

volumes:
  db_data:
  static_data:
  media_data:
  redis_data:

networks:
  traefik:
    external: true
    name: traefik_proxy
